<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenway Saint-Laurent-du-Var · Bientôt en ligne</title>
<meta name="description" content="Zenway Saint-Laurent-du-Var arrive bientôt : Tai-chi chuan, Yoga, Pilates et Qi gong réunis dans une seule séance, sur une musique relaxante.">
<meta name="theme-color" content="#1b4332">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --green-900:#1b4332;
    --green-700:#2d6a4f;
    --teal:#2f8f7f;
    --teal-bright:#36a18c;
    --mint:#d8f3dc;
    --gold:#c9a86a;
    --gold-soft:#e7d6ad;

    --serif:"Cormorant Garamond",Georgia,serif;
    --sans:"DM Sans",system-ui,sans-serif;
    --script:"Caveat",cursive;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100svh;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--sans);
    color:#f3faf5;
    text-align:center;
    padding:32px;
    background:
      radial-gradient(120% 90% at 78% 8%, rgba(54,161,140,.5) 0%, rgba(54,161,140,0) 55%),
      radial-gradient(90% 80% at 12% 90%, rgba(13,54,40,.55) 0%, rgba(13,54,40,0) 60%),
      linear-gradient(150deg,#0f3a2c 0%, var(--green-700) 48%, var(--teal) 100%);
  }

  .logo{display:inline-flex;align-items:center;gap:.55rem;margin-bottom:38px}
  .mark-zen{font-family:var(--sans);font-weight:700;font-size:1.9rem;letter-spacing:-.5px;color:#fff}
  .mark-way{font-family:var(--script);font-weight:600;font-size:2.15rem;margin-left:-.12em;color:var(--mint)}

  .eyebrow{
    font-weight:600;font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--gold-soft);margin-bottom:18px;
  }
  h1{
    font-family:var(--serif);font-weight:600;line-height:1.15;
    font-size:clamp(2.2rem,6vw,3.4rem);margin-bottom:18px;
  }
  p{
    font-size:clamp(1rem,1.6vw,1.15rem);color:#dcefe2;max-width:38ch;margin:0 auto;
  }
</style>
</head>
<body>

  <div>
    <a href="#" class="logo" aria-label="Zenway Saint-Laurent-du-Var">
      <svg width="40" height="40" viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#9fe3c8"/><stop offset="1" stop-color="#2d6a4f"/>
          </linearGradient>
        </defs>
        <path d="M24 44C24 30 16 22 6 18c0 14 8 22 18 26Z" fill="url(#lg)" opacity=".85"/>
        <path d="M24 44C24 30 32 22 42 18c0 14-8 22-18 26Z" fill="url(#lg)" opacity=".7"/>
        <path d="M24 42C24 26 24 14 24 4c8 8 10 22 0 38Z" fill="url(#lg)"/>
      </svg>
      <span><span class="mark-zen">zen</span><span class="mark-way">way</span></span>
    </a>

    <p class="eyebrow">Saint-Laurent-du-Var</p>
    <h1>Bientôt en ligne</h1>
    <p>Le site de Zenway Saint-Laurent-du-Var arrive très prochainement.</p>
  </div>

</body>
</html>
